name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21 (Zulu)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Clean install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force
          npm install --legacy-peer-deps

      - name: Install Capacitor CLI + assets tool
        run: |
          npm install --legacy-peer-deps @capacitor/cli @capacitor/core @capacitor/android @capacitor/assets

      - name: Add Android platform (if not present)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Prepare icon for asset generation
        run: |
          mkdir -p resources
          cp icon.png resources/icon.png

      - name: Generate Android icons
        run: |
          npx capacitor-assets generate --android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Regenerate Gradle wrapper (8.13)
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.13-bin.zip -P /tmp
          unzip -q /tmp/gradle-8.13-bin.zip -d /tmp
          cd android
          /tmp/gradle-8.13/bin/gradle wrapper --gradle-version 8.13

      - name: Strip signingConfig (debug-safe build)
        run: |
          cd android/app
          if grep -q "signingConfig signingConfigs.release" build.gradle 2>/dev/null; then
            sed -i '/signingConfig signingConfigs.release/d' build.gradle
          fi
          if grep -q "signingConfig = signingConfigs.getByName(\"release\")" build.gradle.kts 2>/dev/null; then
            sed -i '/signingConfig = signingConfigs.getByName("release")/d' build.gradle.kts
          fi

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk GTFree-v1.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GTFree-v1
          path: GTFree-v1.apk
